name: Deploy G2PK to Server

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Send docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          passphrase: ${{ secrets.SERVER_SSH_PW }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: ./docker-compose.yml
          target: ./servers/g2pk_server

      - name: Build and push Docker image
        run: |
          echo "${{ secrets.DOCKER_LOGIN_PW }}" | docker login -u "${{ secrets.DOCKER_LOGIN_USERNAME }}" --password-stdin
          docker build -t ${{ secrets.DOCKER_LOGIN_USERNAME }}/hangul_diary_flask_g2pk:latest .
          docker push ${{ secrets.DOCKER_LOGIN_USERNAME }}/hangul_diary_flask_g2pk:latest

      - name: Pull image and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          passphrase: ${{ secrets.SERVER_SSH_PW }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd servers/g2pk_server
            echo "${{ secrets.DOCKER_LOGIN_PW }}" | docker login -u "${{ secrets.DOCKER_LOGIN_USERNAME }}" --password-stdin
            DOCKER_LOGIN_USERNAME=${{ secrets.DOCKER_LOGIN_USERNAME }} docker compose pull
            DOCKER_LOGIN_USERNAME=${{ secrets.DOCKER_LOGIN_USERNAME }} docker compose up -d
